{% extends 'base.html' %}
{% block content %}
<div style="display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; width: 100%; box-sizing: border-box;">
    <div style="background: #FFFFFF; border-radius: 24px; border: 1px solid var(--g200); padding: 44px; max-width: 460px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.03); text-align: center;">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: var(--secondary-light); display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 20px auto;">
            ✉️
        </div>
        <h1 style="font-size: 22px; font-weight: 800; color: var(--g800); margin: 0 0 12px 0;">Correo Enviado</h1>
        <p style="font-size: 14px; color: var(--g500); margin: 0 0 28px 0; line-height: 1.6;">Si la dirección ingresada corresponde a un estudiante registrado, recibirás un mensaje en unos minutos con las instrucciones criptográficas para reestablecer tu clave.</p>
        <a href="{% url 'authentication:login' %}" style="display: block; width: 100%; padding: 12px 20px; border-radius: 10px; background: var(--g100); color: var(--g700); font-size: 14px; font-weight: 700; text-decoration: none; box-sizing: border-box;">
            Entendido, volver al Login
        </a>
    </div>
</div>
{% endblock content %}
