{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="padding: 10px 10px; max-width: 800px; margin: 0 auto;">
    
    <header style="text-align: center; margin-bottom: 32px;">
        <div style="font-size: 48px; margin-bottom: 12px;">🎯</div>
        <h1 style="font-size: 28px; font-weight: 900; color: var(--g800); margin: 0 0 8px 0;">Diagnostic Test</h1>
        <p style="font-size: 15px; color: var(--g500); margin: 0;">Discover your initial English level. Turn on your microphone and speakers.</p>
    </header>

    <section style="background: #FFFFFF; border: 1px solid var(--g200); border-radius: 16px; padding: 32px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03);">
        
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap;">
            <span id="progress-text" style="font-size: 14px; font-weight: 700; color: var(--g600);">Question 1 of X</span>
            <span id="progress-percentage" style="font-size: 14px; font-weight: 800; color: var(--primary);">0%</span>
        </header>
        <div style="height: 8px; background: var(--g100); border-radius: 999px; margin-bottom: 32px;">
            <div id="progress-bar" style="height: 100%; width: 0%; background: var(--primary); border-radius: 999px; transition: width 0.3s ease;"></div>
        </div>

        <article style="margin-bottom: 32px;" id="question-area">
            <span id="question-category" style="display: inline-block; background: var(--primary-light); color: var(--primary); font-size: 12px; font-weight: 800; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; text-transform: uppercase;">Category</span>
            
            <h2 id="question-text" style="font-size: 22px; font-weight: 800; color: var(--g800); margin: 0 0 16px 0; line-height: 1.5;">
                Loading question...
            </h2>

            <button id="btn-tts" type="button" style="display: none; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 10px; border: 2px solid var(--secondary); background: var(--secondary-light); color: var(--secondary); font-weight: 700; cursor: pointer; margin-bottom: 16px;">
                🔊 Listen to Audio
            </button>
            
            <button id="btn-stt" type="button" style="display: none; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 10px; border: 2px solid var(--danger); background: var(--danger-light); color: var(--danger); font-weight: 700; cursor: pointer; margin-bottom: 16px;">
                🎙️ Start Speaking
            </button>
            <p id="stt-feedback" style="font-size: 14px; color: var(--g600); font-style: italic; display: none;"></p>

        </article>

        <form id="diagnostic-form">
            {% csrf_token %}
            
            <section id="options-container" style="display: grid; grid-template-columns: 1fr; gap: 14px;">
            </section>
        </form>
    </section>

    <footer style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
        <a href="{% url 'progress:dashboard' %}" style="padding: 14px 24px; border-radius: 10px; border: 1.5px solid var(--g300); text-decoration: none; color: var(--g600); font-weight: 700;">Quit test</a>
        
        <button id="btn-next" type="button" style="padding: 14px 32px; border-radius: 10px; border: none; background: var(--primary); color: #FFFFFF; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);">
            Next Question ➔
        </button>
    </footer>

</div>

<script src="{% static 'diagnosis/js/test.js' %}"></script>
{% endblock content %}
