{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="display: flex; min-height: 100vh; align-items: center; justify-content: center; background-color: var(--g50); padding: 20px; width: 100%; box-sizing: border-box;">
    
    <div style="background: #FFFFFF; border-radius: 24px; border: 1px solid var(--g200); padding: 44px; max-width: 460px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.03); text-align: center;">
        
        <div style="width: 48px; height: 48px; border-radius: 12px; background: var(--primary); display: flex; align-items: center; justify-content: center; color: #FFFFFF; font-weight: 800; font-size: 22px; margin: 0 auto 24px auto;">
            S
        </div>

        <h1 style="font-size: 24px; font-weight: 800; color: var(--g800); margin: 0 0 8px 0;">¿Olvidaste tu contraseña?</h1>
        <p style="font-size: 14px; color: var(--g500); margin: 0 0 32px 0; line-height: 1.5;">Introduce el correo electrónico institucional de la UNEMI asociado a tu cuenta y te enviaremos un enlace seguro para restaurarla.</p>

        <form method="POST" style="text-align: left; display: flex; flex-direction: column; gap: 20px;">
            {% csrf_token %}
            
            <div>
                <label for="id_email" style="display: block; font-size: 13px; font-weight: 700; color: var(--g700); margin-bottom: 8px;">Correo electrónico</label>
                <input type="email" name="email" id="id_email" autocomplete="email" placeholder="ejemplo@unemi.edu.ec" style="width: 100%; padding: 12px 14px; font-size: 14px; border: 1.5px solid var(--g200); border-radius: 9px; background: #FFFFFF; color: var(--g800); box-sizing: border-box; outline: none; transition: border-color 0.2s;" required>
            </div>

            <button type="submit" style="width: 100%; padding: 13px 20px; border-radius: 10px; border: none; background: var(--primary); color: #FFFFFF; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s ease; margin-top: 8px;">
                Enviar enlace de recuperación
            </button>
        </form>

        <div style="margin-top: 28px; border-top: 1px solid var(--g100); padding-top: 20px;">
            <a href="{% url 'authentication:login' %}" style="font-size: 13.5px; font-weight: 700; color: var(--primary); text-decoration: none;">
                Volver al inicio de sesión
            </a>
        </div>
    </div>
</div>
{% endblock content %}
